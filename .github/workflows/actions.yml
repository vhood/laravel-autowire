name: CI

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']

jobs:
    tests:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: [8.1, 8.2, 8.3]
                laravel: [10, 11, 12]
                include:
                    - laravel: 10
                      testbench: ^8.0
                      pest: ^2.0
                    - laravel: 11
                      testbench: ^9.0
                      pest: ^2.0
                    - laravel: 12
                      testbench: ^10.0
                      pest: ^3.0
                    - laravel: 13
                      testbench: ^11.0
                      pest: ^4.0
                exclude:
                    - php: 8.1
                      laravel: 11
                    - php: 8.1
                      laravel: 12
                    - php: 8.1
                      laravel: 13
                    - php: 8.2
                      laravel: 13

        name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}.x

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  extensions: dom, curl, libxml, mbstring, zip
                  coverage: none

            - name: Disable Composer Insecure Blocking
              run: |
                  composer config --global audit.block-insecure false || true
                  composer config --global policy.advisories.block false || true

            - name: Configure Matrix Dependencies
              run: |
                  composer require "illuminate/support:${{ matrix.laravel }}.*" "illuminate/console:${{ matrix.laravel }}.*" "orchestra/testbench:${{ matrix.testbench }}" "pestphp/pest:${{ matrix.pest }}" --dev --no-interaction --no-update

            - name: Adjust Pint for PHP 8.1
              if: matrix.php == '8.1'
              run: composer require "laravel/pint:^1.13" --no-interaction --no-update

            - name: Install dependencies
              run: composer update --prefer-dist --no-interaction --no-progress

            - name: Check for vulnerable dependencies
              run: composer audit --format=summary || echo "Audit completed with warnings"

            - name: Execute Code Style Check (Laravel Pint)
              run: ./vendor/bin/pint --test

            - name: Execute Static Analysis (PHPStan)
              run: ./vendor/bin/phpstan analyse

            - name: Execute Tests via Pest
              run: ./vendor/bin/pest
